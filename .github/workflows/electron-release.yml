name: Publish Realeco

on:
  push:
    branches: [main]
    paths:
      - realeco-release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: realeco-release
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Realeco release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
      version_valid: ${{ steps.validate.outputs.version_valid }}
      should_build: ${{ steps.validate.outputs.should_build }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate commit message and version sources
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_FILE_VERSION="$(node -e "const version=require('./package.json').version; if (!/^[0-9]+\\.[0-9]+\\.[0-9]+$/.test(version)) throw new Error('package.json version must be a stable A.B.C version for a manual Realeco release.'); process.stdout.write(version);")"
          else
            COMMIT_MESSAGE="$(git log -1 --format=%B)"
            RELEASE_FILE_VERSION="$(COMMIT_MESSAGE="${COMMIT_MESSAGE}" node -e "const fs=require('fs'); const { validateRealecoReleaseMetadata }=require('./shared/realecoReleaseMetadata.cjs'); process.stdout.write(validateRealecoReleaseMetadata({ commitMessage: process.env.COMMIT_MESSAGE, releaseFileContent: fs.readFileSync('realeco-release', 'utf8'), packageVersion: require('./package.json').version }));")"
          fi

          RELEASES_FILE="$(mktemp)"
          trap 'rm -f "${RELEASES_FILE}"' EXIT
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > "${RELEASES_FILE}"
          RELEASE_FILE_VERSION="${RELEASE_FILE_VERSION}" RELEASES_FILE="${RELEASES_FILE}" node <<'NODE'
          const fs = require('fs');
          const target = process.env.RELEASE_FILE_VERSION;
          const releases = JSON.parse(fs.readFileSync(process.env.RELEASES_FILE, 'utf8'));
          const parse = (tag) => {
            const match = /^v?(\d+)\.(\d+)\.(\d+)$/.exec(tag || '');
            return match ? match.slice(1).map(Number) : null;
          };
          const compare = (left, right) => left.findIndex((part, index) => part !== right[index]);
          const compareVersions = (left, right) => {
            const index = compare(left, right);
            return index === -1 ? 0 : left[index] > right[index] ? 1 : -1;
          };
          const targetParts = parse(target);
          const existing = releases.find((release) => release.tag_name === `v${target}`);
          const publicReleases = releases.filter((release) => !release.draft && !release.prerelease && parse(release.tag_name));
          const latest = publicReleases.reduce((current, release) => {
            if (!current || compareVersions(parse(release.tag_name), parse(current.tag_name)) > 0) return release;
            return current;
          }, null);

          if (existing && !existing.draft && !existing.prerelease) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${target}\ntag=v${target}\nversion_valid=true\nshould_build=false\n`);
            process.exit(0);
          }
          if (existing && !existing.draft) {
            throw new Error(`v${target} already exists as a pre-release; Realeco tags must be stable releases.`);
          }
          if (latest && compareVersions(targetParts, parse(latest.tag_name)) <= 0) {
            throw new Error(`Realeco version ${target} must be higher than published ${latest.tag_name}.`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${target}\ntag=v${target}\nversion_valid=true\nshould_build=true\n`);
          NODE

  prepare-release:
    name: Prepare Realeco draft
    needs: validate-release
    if: needs.validate-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Clean up orphaned release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        shell: bash
        run: |
          if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 && gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          fi

  build:
    name: Build Realeco on ${{ matrix.os }}
    needs: [validate-release, prepare-release]
    if: needs.validate-release.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp Realeco package metadata
        shell: bash
        env:
          TARGET_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=require('./package.json'); pkg.version=process.env.TARGET_VERSION; pkg.foliaReleaseChannel='realeco'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Generate release notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
          MACOS_UNSIGNED_HELP_URL: https://github.com/${{ github.repository }}/blob/${{ github.sha }}/docs/desktop/macos-app-damaged.md
        run: |
          node <<'NODE'
          const fs = require('fs');
          const template = fs.readFileSync('.github/release-draft-template.md', 'utf8');
          const replacements = {
            VERSION: process.env.RELEASE_VERSION,
            TAG: process.env.RELEASE_TAG,
            MACOS_UNSIGNED_HELP_URL: process.env.MACOS_UNSIGNED_HELP_URL,
          };
          const notes = Object.entries(replacements).reduce((text, [key, value]) => text.split(`{{${key}}}`).join(value || ''), template);
          fs.mkdirSync('build', { recursive: true });
          fs.writeFileSync('build/release-notes.md', `${notes.trim()}\n`);
          NODE

      - name: Build web app for Electron
        env:
          ELECTRON: 'true'
          APP_VERSION_LABEL: Realeco
          APP_RELEASE_CHANNEL: realeco
        run: npm run build

      - name: Package Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never --config.publish.channel=latest

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: realeco-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.yml
            !release/builder-debug.yml
            release/*.deb
            release/*.rpm
            release/*.pkg.tar.zst
            build/release-notes.md
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish Realeco draft
    needs: [validate-release, build]
    if: needs.validate-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: realeco-artifacts

      - name: Publish GitHub draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        shell: bash
        run: |
          NOTES_FILE=$(find realeco-artifacts -type f -name 'release-notes.md' | head -n 1)
          mapfile -d '' files < <(find realeco-artifacts -type f ! -name 'release-notes.md' -print0)
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
            gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --title "Realeco ${RELEASE_TAG}" --notes-file "${NOTES_FILE}"
          else
            gh release create "${RELEASE_TAG}" "${files[@]}" --repo "${GITHUB_REPOSITORY}" --title "Realeco ${RELEASE_TAG}" --notes-file "${NOTES_FILE}" --target "${GITHUB_SHA}" --draft
          fi


